[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I"]   # pycodestyle errors, pyflakes, isort
ignore = ["E501"]           # line length handled by black

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "llm: marks tests that make real LLM API calls (deselect with '-m not llm')",
]